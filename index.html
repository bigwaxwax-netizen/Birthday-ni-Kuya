<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Kuya!</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow: hidden;
}

h1 {
    margin-top: 100px;
    font-size: 55px;
}

.popup {
    display: none;
    position: fixed;
    z-index: 10;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.75);
}

.popup-content {
    background: white;
    margin: 5% auto;
    padding: 25px;
    width: 350px;
    border-radius: 20px;
    text-align: center;
    color: black;
    animation: pop 0.6s ease;
    box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

.popup img {
    width: 100%;
    border-radius: 15px;
}

.close {
    float: right;
    font-size: 30px;
    cursor: pointer;
    color: #ff4f81;
}

.gift-btn {
    background: #ff4f81;
    color: white;
    border: none;
    padding: 14px 22px;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.gift-btn:hover {
    background: #ff2a68;
    transform: scale(1.05);
}

#giftBox {
    display: none;
    margin-top: 20px;
    animation: pop 0.6s ease;
}

@keyframes pop {
    from {
        transform: scale(0.5);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Kuya! 🎂</h1>

<div id="birthdayPopup" class="popup">
    <div class="popup-content">

        <span class="close" onclick="closePopup()">&times;</span>

        <h2>Happy Birthday, Kuya! 🎈</h2>

        <!-- First Image -->
        <img src="carlo.jpeg" alt="Carlo">

        <p>Wait for your surprise... 🎁</p>

        <!-- Surprise Button -->
        <button class="gift-btn" onclick="openGift()">🎁 Open Surprise Box</button>

        <!-- Hidden Surprise -->
        <div id="giftBox">
            <img src="surprise.jpg" alt="Surprise">
            <h3>Surpriseeee! 🎉</h3>
            <p>Wishing you happiness, success, and more birthdays to come! ❤️</p>
        </div>

    </div>
</div>

<script>
window.onload = function() {
    document.getElementById("birthdayPopup").style.display = "block";
}

function closePopup() {
    document.getElementById("birthdayPopup").style.display = "none";
}

function openGift() {
    document.getElementById("giftBox").style.display = "block";
}
</script>

</body>
</html>
